services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-thinkboard}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in Coolify}
      POSTGRES_DB: ${POSTGRES_DB:-thinkboard}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./apps/api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-thinkboard}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-thinkboard}
      EDITOR_PASSWORD: ${EDITOR_PASSWORD:?Set EDITOR_PASSWORD in Coolify}
      SESSION_SECRET: ${SESSION_SECRET:?Set SESSION_SECRET in Coolify}
      UPLOAD_DIR: /uploads
      API_PORT: 3001
      NODE_ENV: production
    volumes:
      - uploads:/uploads
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: ./apps/web
      args:
        VITE_API_URL: ${PUBLIC_API_URL:-}
    restart: unless-stopped
    depends_on:
      - api

volumes:
  pgdata:
  uploads:
